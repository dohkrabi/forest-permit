<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1c1e">
<title>แผนที่เขตทางหลวง — แขวงทางหลวงกระบี่</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.min.js"></script>
<script src="https://unpkg.com/shpjs@4.0.4/dist/shp.js"
        onerror="this.onerror=null;var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/shpjs@4.0.4/dist/shp.js';document.head.appendChild(s);"></script>
<style>
:root{--ink:#1a1c1e;--paper:#fff;--road:#f5b400;--line:#e2e4e8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',Tahoma,'Leelawadee UI',sans-serif}
#map{position:absolute;inset:0;z-index:1}

.topbar{position:absolute;top:0;left:0;right:0;z-index:1000;
  background:linear-gradient(180deg,rgba(26,28,30,.92),rgba(26,28,30,.78));
  color:#fff;padding:10px 14px 8px;backdrop-filter:blur(6px)}
.topbar h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar h1 .badge{background:var(--road);color:#1a1c1e;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:4px;letter-spacing:.5px}
.topbar h1 a.home{margin-left:auto;color:#fff;text-decoration:none;font-size:12px;
  border:1px solid rgba(255,255,255,.35);padding:3px 10px;border-radius:14px}
.chips{display:flex;gap:6px;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.chip{flex:0 0 auto;border:1.5px solid rgba(255,255,255,.35);background:rgba(255,255,255,.08);
  color:#fff;font-size:12.5px;padding:5px 12px;border-radius:20px;cursor:pointer;
  display:flex;align-items:center;gap:6px;user-select:none;transition:.15s}
.chip .dot{width:9px;height:9px;border-radius:50%}
.chip.on{background:#fff;color:var(--ink);border-color:#fff;font-weight:600}
.chip.add{border-style:dashed;font-weight:600}
.chip.busy{opacity:.55;pointer-events:none}

.gpsbtn{position:absolute;right:12px;bottom:96px;z-index:1000;width:48px;height:48px;
  border-radius:50%;background:#fff;border:none;box-shadow:0 2px 10px rgba(0,0,0,.28);
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gpsbtn.active{background:var(--road)}

.sheet{position:absolute;left:0;right:0;bottom:0;z-index:1000;background:var(--paper);
  border-radius:16px 16px 0 0;box-shadow:0 -3px 18px rgba(0,0,0,.22);
  padding:10px 16px 12px;transform:translateY(calc(100% - 58px));transition:transform .25s ease}
.sheet.open{transform:translateY(0)}
.sheet .grab{width:38px;height:4px;background:#cfd3d8;border-radius:2px;margin:0 auto 8px}
.sheet h2{font-size:14px;font-weight:600;color:var(--ink)}
.sheet .sum{font-size:12px;color:#5f646b;margin-top:2px}
.searchrow{display:flex;gap:8px;margin-top:8px}
.searchrow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit}
.routes{margin-top:8px;display:grid;gap:8px;max-height:34vh;overflow-y:auto}
.rcard{border:1px solid var(--line);border-left:4px solid;border-radius:8px;padding:8px 10px;
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px}
.rcard b{font-size:13.5px}
.rcard .meta{font-size:11.5px;color:#5f646b;margin-top:2px}
.rcard .go{font-size:11px;color:#1565c0;font-weight:600;white-space:nowrap}
.rcard .del{font-size:15px;color:#c62828;border:none;background:none;cursor:pointer;padding:4px 6px}

.toast{position:absolute;left:50%;bottom:70px;transform:translateX(-50%);z-index:1200;
  background:rgba(26,28,30,.92);color:#fff;font-size:13px;padding:9px 16px;border-radius:8px;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:86vw;text-align:center}
.toast.show{opacity:1}

.pp{font-size:12.5px;line-height:1.55}
.pp b{font-size:13.5px}
.pp table{margin-top:4px;border-collapse:collapse}
.pp td{padding:1px 6px 1px 0;color:#333;word-break:break-all}
.pp td:first-child{color:#777;white-space:nowrap}
.pp a.nav{display:inline-block;margin-top:7px;background:#1a73e8;color:#fff;text-decoration:none;
  padding:5px 12px;border-radius:6px;font-weight:600;font-size:12px}
.leaflet-popup-content{margin:10px 14px;max-height:46vh;overflow-y:auto}
.ptlabel{background:transparent;border:none;box-shadow:none}
.ptlabel div{transform:translate(-50%,-130%);background:rgba(26,28,30,.85);color:#fff;
  font-size:10px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap;
  display:inline-block}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <h1><span class="badge">ทล.</span> แผนที่เขตทางหลวง
      <span id="routeCount" style="opacity:.65;font-weight:400;font-size:12px"></span>
      <a class="home" href="./index.html">🌲 คำขอป่าไม้</a></h1>
  <div class="chips" id="chips"></div>
</div>

<button class="gpsbtn" id="gps" title="ตำแหน่งของฉัน">📍</button>
<input type="file" id="filein" multiple accept=".zip,.shp,.dbf,.prj,.cpg,.shx" style="display:none">
<div class="toast" id="toast"></div>

<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2>ข้อมูลสายทาง <span style="float:right;font-weight:400;color:#8a8f96;font-size:12px">แตะเพื่อเปิด ▲</span></h2>
  <div class="sum" id="sum"></div>
  <div class="searchrow"><input id="q" type="search" placeholder="ค้นหาสายทาง เช่น 4038, อ่าวนาง"></div>
  <div class="routes" id="routes"></div>
</div>

function toast(msg,ms){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),ms||2600);}
function utmOf(lat,lon){try{const [x,y]=proj4(UTM47,[lon,lat]);return{x,y};}catch(e){return null;}}

function pointPopup(title,lat,lon,extraRows){
  const u=utmOf(lat,lon);
  let rows="";
  if(u) rows+=`<tr><td>X (UTM47N)</td><td>${u.x.toFixed(3)}</td></tr><tr><td>Y (UTM47N)</td><td>${u.y.toFixed(3)}</td></tr>`;
  rows+=`<tr><td>Lat</td><td>${lat.toFixed(7)}</td></tr><tr><td>Lon</td><td>${lon.toFixed(7)}</td></tr>`;
  rows+=extraRows||"";
  return `<div class="pp"><b>${title}</b><table>${rows}</table>
    <a class="nav" target="_blank" href="https://www.google.com/maps?q=${lat},${lon}">นำทางด้วย Google Maps</a></div>`;
}

function addPoint(g,name,color,n,lat,lon,extraRows){
  L.circleMarker([lat,lon],{radius:5.5,color:'#fff',weight:1.5,fillColor:color,fillOpacity:1})
    .addTo(g).bindPopup(()=>pointPopup(`${name} — หมุดที่ ${n}`,lat,lon,extraRows));
  (routePts[name]=routePts[name]||[]).push({n,lat,lon});
}

/* ---------- ป้ายเลขหมุด: แสดงเฉพาะเมื่อซูมเข้าและอยู่ในจอ ---------- */
const labelLayer=L.layerGroup().addTo(map);
function refreshLabels(){
  labelLayer.clearLayers();
  if(map.getZoom()<LABEL_ZOOM) return;
  const b=map.getBounds().pad(0.1);
  for(const [name,pts] of Object.entries(routePts)){
    if(!groups[name]||!map.hasLayer(groups[name])) continue;
    for(const p of pts){
      if(!b.contains([p.lat,p.lon])) continue;
      labelLayer.addLayer(L.marker([p.lat,p.lon],{
        interactive:false,
        icon:L.divIcon({className:'ptlabel',html:`<div>${p.n}</div>`,iconSize:[0,0]})
      }));
    }
  }
}
map.on('zoomend moveend',refreshLabels);

/* ---------- สายทางในตัว ---------- */
for(const [name,e] of Object.entries(BUILTIN)){
  const col=PALETTE[colorIdx++%PALETTE.length];
  const g=L.featureGroup();
  if(e.polygon.length){
    const rings=e.polygon.map(r=>r.map(([lo,la])=>[la,lo]));
    const i=e.info||{};
    const hasInfo=i.rai!=null;
    L.polygon(rings,{color:col,weight:3,fillColor:col,fillOpacity:.12}).addTo(g)
      .bindPopup(`<div class="pp"><b>เขตทาง ${name}</b>${hasInfo?`<br>เนื้อที่ ${i.rai.toFixed(0)} ไร่ ${i.ngan.toFixed(0)} งาน ${i.wa.toFixed(0)} ตร.วา<br><span style="color:#777">(${Math.round(i.area_m2).toLocaleString()} ตร.ม.)</span>`:""}</div>`);
  }
  if(e.lines&&e.lines.length){
    for(const ln of e.lines)
      L.polyline(ln.map(([lo,la])=>[la,lo]),{color:col,weight:2.5,dashArray:'6 4'}).addTo(g)
        .bindPopup(`<div class="pp"><b>${name} — แนวเส้น</b></div>`);
  }
  e.points.forEach(p=>addPoint(g,name,col,p.n,p.lat,p.lon));
  g.addTo(map); groups[name]=g;
  const i=e.info||{};
  routeMeta[name]={color:col,ptCount:e.points.length,
    infoText:(i.rai!=null?`${i.rai.toFixed(0)} ไร่ ${i.ngan.toFixed(0)} งาน ${i.wa.toFixed(0)} ตร.วา · `:"")+`หมุด ${e.points.length} จุด`,
    imported:false};
}

/* ---------- นำเข้า shapefile เพิ่ม ---------- */
function addGeojsonRoute(name,gj,color,save){
  if(groups[name]) name=name+" ("+new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})+")";
  const g=L.featureGroup();
  let ptN=0;
  const feats=(gj.type==="FeatureCollection")?gj.features:[gj];
  for(const f of feats){
    if(!f.geometry) continue;
    const gt=f.geometry.type, props=f.properties||{};
    const attrRows=Object.entries(props).slice(0,12)
      .map(([k,v])=>`<tr><td>${k}</td><td>${v==null?"":v}</td></tr>`).join("");
    if(gt==="Point"||gt==="MultiPoint"){
      const coords=(gt==="Point")?[f.geometry.coordinates]:f.geometry.coordinates;
      for(const [lo,la] of coords){ptN++;addPoint(g,name,color,ptN,la,lo,attrRows);}
    }else{
      L.geoJSON(f,{style:{color:color,weight:3,fillColor:color,fillOpacity:.12}}).addTo(g)
        .bindPopup(`<div class="pp"><b>${name}</b><table>${attrRows}</table></div>`);
    }
  }
  g.addTo(map); groups[name]=g;
  routeMeta[name]={color,ptCount:ptN,
    infoText:(ptN?`หมุด ${ptN} จุด`:"ข้อมูลรูปแปลง/เส้นทาง")+" · นำเข้าเอง",imported:true};
  addChip(name,color); rebuildSheet();
  try{map.fitBounds(g.getBounds(),{padding:[60,30]});}catch(e){}
  if(save) persist(name,gj,color);
  refreshLabels();
}
function persist(name,gj,color){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY)||"{}");s[name]={gj,color};
    localStorage.setItem(LS_KEY,JSON.stringify(s));}
  catch(e){toast("⚠️ ไฟล์ใหญ่เกินพื้นที่บันทึกของเบราว์เซอร์ — แสดงได้ แต่ครั้งหน้าต้องนำเข้าใหม่",4200);}
}
function unpersist(name){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY)||"{}");delete s[name];
    localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){}
}
async function handleFiles(files){
  if(!window.shp){toast("โหลดตัวอ่าน shapefile ไม่สำเร็จ — ตรวจสอบอินเทอร์เน็ตแล้วลองใหม่",4000);return;}
  const btn=document.getElementById('chipAdd');
  btn.classList.add('busy');btn.textContent="⏳ กำลังอ่าน…";
  try{
    const arr=[...files];
    for(const z of arr.filter(f=>/\.zip$/i.test(f.name))){
      const out=await shp(await z.arrayBuffer());
      for(const fc of (Array.isArray(out)?out:[out])){
        addGeojsonRoute(fc.fileName||z.name.replace(/\.zip$/i,""),fc,
          PALETTE[colorIdx++%PALETTE.length],true);
      }
      toast(`นำเข้า ${z.name} สำเร็จ`);
    }
    const loose=arr.filter(f=>!/\.zip$/i.test(f.name));
    if(loose.length){
      const byBase={};
      for(const f of loose){
        const m=f.name.match(/^(.*)\.(shp|dbf|prj|cpg|shx)$/i);
        if(m)(byBase[m[1]]=byBase[m[1]]||{})[m[2].toLowerCase()]=f;
      }
      for(const [base,set] of Object.entries(byBase)){
        if(!set.shp){toast(`"${base}" ไม่มีไฟล์ .shp — ข้าม`,3200);continue;}
        const prjTxt=set.prj?await set.prj.text():UTM47;
        if(!set.prj) toast(`"${base}" ไม่มี .prj — สมมติเป็น UTM 47N`,3600);
        const geom=shp.parseShp(await set.shp.arrayBuffer(),prjTxt);
        let gj;
        if(set.dbf){
          const props=shp.parseDbf(await set.dbf.arrayBuffer(),set.cpg?await set.cpg.text():"UTF-8");
          gj=shp.combine([geom,props]);
        }else gj={type:"FeatureCollection",features:geom.map(g=>({type:"Feature",geometry:g,properties:{}}))};
        addGeojsonRoute(base,gj,PALETTE[colorIdx++%PALETTE.length],true);
        toast(`นำเข้า ${base} สำเร็จ`);
      }
    }
  }catch(err){console.error(err);toast("อ่านไฟล์ไม่สำเร็จ: "+err.message,4200);}
  finally{btn.classList.remove('busy');btn.textContent="＋ นำเข้า";
    document.getElementById('filein').value="";}
}
document.getElementById('filein').addEventListener('change',e=>handleFiles(e.target.files));

/* ---------- chips ---------- */
const chips=document.getElementById('chips');
let allOn=true;
const allBtn=document.createElement('div');
allBtn.className='chip on';allBtn.textContent='ทั้งหมด';
allBtn.onclick=()=>{
  allOn=!allOn;allBtn.classList.toggle('on',allOn);
  for(const [n,g] of Object.entries(groups)){
    const ch=chips.querySelector(`[data-route="${CSS.escape(n)}"]`);
    if(allOn){if(!map.hasLayer(g))map.addLayer(g);if(ch)ch.classList.add('on');}
    else{if(map.hasLayer(g))map.removeLayer(g);if(ch)ch.classList.remove('on');}
  }
  refreshLabels();
};
chips.appendChild(allBtn);

function addChip(name,color){
  const c=document.createElement('div');
  c.className='chip on';c.dataset.route=name;
  c.innerHTML=`<span class="dot" style="background:${color}"></span>${name}`;
  c.onclick=()=>{
    if(map.hasLayer(groups[name])){map.removeLayer(groups[name]);c.classList.remove('on');}
    else{map.addLayer(groups[name]);c.classList.add('on');}
    refreshLabels();
  };
  chips.insertBefore(c,document.getElementById('chipAdd')||null);
}
for(const name of Object.keys(BUILTIN)) addChip(name,routeMeta[name].color);

const addBtn=document.createElement('div');
addBtn.className='chip add';addBtn.id='chipAdd';addBtn.textContent='＋ นำเข้า';
addBtn.onclick=()=>document.getElementById('filein').click();
chips.appendChild(addBtn);
const bm=document.createElement('div');
bm.className='chip';bm.textContent='🗺 ดาวเทียม';
bm.onclick=()=>{map.removeLayer(bases[baseIdx][1]);baseIdx=(baseIdx+1)%bases.length;
  bases[baseIdx][1].addTo(map);bm.textContent='🗺 '+bases[baseIdx][0];};
chips.appendChild(bm);

/* ---------- GPS ---------- */
let meMarker=null,meCircle=null,watching=false,watchId=null;
const gpsBtn=document.getElementById('gps');
gpsBtn.onclick=()=>{
  if(watching){navigator.geolocation.clearWatch(watchId);watching=false;
    gpsBtn.classList.remove('active');
    if(meMarker){map.removeLayer(meMarker);map.removeLayer(meCircle);meMarker=null;}return;}
  if(!navigator.geolocation){toast('อุปกรณ์นี้ไม่รองรับ GPS');return;}
  watching=true;gpsBtn.classList.add('active');
  watchId=navigator.geolocation.watchPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    if(!meMarker){
      meMarker=L.circleMarker(ll,{radius:8,color:'#fff',weight:3,fillColor:'#1a73e8',fillOpacity:1}).addTo(map);
      meCircle=L.circle(ll,{radius:pos.coords.accuracy,color:'#1a73e8',weight:1,fillOpacity:.08}).addTo(map);
      map.setView(ll,17);
    }else{meMarker.setLatLng(ll);meCircle.setLatLng(ll);meCircle.setRadius(pos.coords.accuracy);}
  },err=>{toast('เปิดตำแหน่งไม่ได้: '+err.message);watching=false;gpsBtn.classList.remove('active');},
  {enableHighAccuracy:true,maximumAge:3000});
};

/* ---------- bottom sheet + ค้นหา ---------- */
const sheet=document.getElementById('sheet');
sheet.querySelector('h2').onclick=()=>sheet.classList.toggle('open');
sheet.querySelector('.grab').onclick=()=>sheet.classList.toggle('open');
document.getElementById('q').addEventListener('input',rebuildSheet);

function rebuildSheet(){
  const names=Object.keys(routeMeta);
  document.getElementById('routeCount').textContent=`${names.length} สายทาง`;
  const total=names.reduce((s,n)=>s+routeMeta[n].ptCount,0);
  document.getElementById('sum').textContent=`หมุดพิกัดรวม ${total.toLocaleString()} จุด · WGS84/UTM 47N · ซูมเข้าเพื่อดูเลขหมุด · ＋ นำเข้า รับ .zip หรือ .shp+.dbf+.prj`;
  const q=(document.getElementById('q').value||"").trim().toLowerCase();
  const el=document.getElementById('routes');el.innerHTML="";
  for(const n of names){
    if(q&&!n.toLowerCase().includes(q))continue;
    const m=routeMeta[n];
    const d=document.createElement('div');
    d.className='rcard';d.style.borderLeftColor=m.color;
    d.innerHTML=`<div style="flex:1"><b>${n}</b><div class="meta">${m.infoText}</div></div><span class="go">ซูมไป ›</span>`;
    d.onclick=()=>{
      if(!map.hasLayer(groups[n])){map.addLayer(groups[n]);
        const ch=chips.querySelector(`[data-route="${CSS.escape(n)}"]`);if(ch)ch.classList.add('on');}
      try{map.fitBounds(groups[n].getBounds(),{padding:[60,30]});}catch(e){}
      sheet.classList.remove('open');refreshLabels();
    };
    if(m.imported){
      const del=document.createElement('button');
      del.className='del';del.textContent='✕';del.title='ลบสายทางนี้';
      del.onclick=ev=>{ev.stopPropagation();
        if(!confirm(`ลบ "${n}" ออกจากแผนที่?`))return;
        map.removeLayer(groups[n]);delete groups[n];delete routeMeta[n];delete routePts[n];
        const ch=chips.querySelector(`[data-route="${CSS.escape(n)}"]`);if(ch)ch.remove();
        unpersist(n);rebuildSheet();refreshLabels();};
      d.appendChild(del);
    }
    el.appendChild(d);
  }
}

/* ---------- โหลดสายทางที่เคยนำเข้า ---------- */
(function(){
  try{
    const s=JSON.parse(localStorage.getItem(LS_KEY)||"{}");
    for(const [name,rec] of Object.entries(s)){
      addGeojsonRoute(name,rec.gj,rec.color,false);
    }
  }catch(e){}
})();

rebuildSheet();

/* ---------- ?route= จากหน้าคำขอป่าไม้ ---------- */
function norm(s){return String(s).toLowerCase().replace(/ทล\.?/g,"").replace(/\s+/g,"");}
const routeQ=new URLSearchParams(location.search).get('route');
let jumped=false;
if(routeQ){
  const q=norm(routeQ);
  const hits=Object.keys(groups).filter(n=>{const nn=norm(n);return nn.includes(q)||q.includes(nn);});
  if(hits.length){
    const b=L.latLngBounds([]);
    for(const h of hits){try{b.extend(groups[h].getBounds());}catch(e){}}
    if(b.isValid()){map.fitBounds(b,{padding:[60,30]});jumped=true;}
    toast(hits.length===1?`สายทาง ${hits[0]}`:`พบ ${hits.length} ช่วง: ${hits.join(", ")}`,3200);
  }else toast(`ไม่พบสายทาง "${routeQ}" ในแผนที่`,3200);
}
if(!jumped){
  const all=L.latLngBounds([]);
  for(const g of Object.values(groups)){try{all.extend(g.getBounds());}catch(e){}}
  if(all.isValid())map.fitBounds(all,{padding:[60,30]});
}
</script>
